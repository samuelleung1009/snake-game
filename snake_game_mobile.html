<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>贪食蛇游戏 - 陈翔递进版</title>
    <style>
        /* 基础样式 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a202c;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        /* 顶部状态栏 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .game-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #48bb78;
        }
        
        .stats-values {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-label {
            display: block;
            font-size: 0.85em;
            opacity: 0.7;
        }
        
        .stat-value {
            display: block;
            font-size: 1.4em;
            font-weight: bold;
            color: #48bb78;
        }
        
        .high-score-value {
            color: #ed8936;
        }
        
        /* 游戏区域 - 上半部分 */
        .game-area-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 0;
            width: 100%;
        }
        
        .game-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            background: #2d3748;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            max-height: 90%;
            aspect-ratio: 1.3 / 1;
        }
        
        /* 控制面板 */
        .control-panel {
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 20px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.2);
            min-height: 260px;
            display: flex;
            flex-direction: column;
        }
        
        .control-title {
            color: #333;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        /* 方向键控制 */
        .direction-controls {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .direction-grid {
            display: grid;
            grid-template-columns: 110px 110px 110px;
            grid-template-rows: 110px 110px 110px;
            gap: 15px;
        }
        
        .direction-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.15s;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            user-select: none;
            padding: 10px;
            min-height: 100px;
        }
        
        .direction-btn:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.5);
        }
        
        /* 方向按钮位置 */
        .direction-btn.up { grid-column: 2; grid-row: 1; }
        .direction-btn.left { grid-column: 1; grid-row: 2; }
        .direction-btn.pause { 
            grid-column: 2; grid-row: 2; 
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            box-shadow: 0 6px 20px rgba(237, 137, 54, 0.3);
        }
        .direction-btn.right { grid-column: 3; grid-row: 2; }
        .direction-btn.down { grid-column: 2; grid-row: 3; }
        
        .direction-icon {
            font-size: 3em;
            margin-bottom: 5px;
        }
        
        .direction-label {
            font-size: 0.9em;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="stats-bar">
        <div class="game-title">贪食蛇游戏（陈翔递进版）</div>
        <div class="stats-values">
            <div class="stat">
                <span class="stat-label">长度</span>
                <span class="stat-value" id="scoreDisplay">3</span>
            </div>
            <div class="stat">
                <span class="stat-label">速度</span>
                <span id="speedDisplay" style="color: #ed8936; display: block; font-size: 1.4em; font-weight: bold;" title="初始速度">x1.0</span>
            </div>
            <div class="stat">
                <span class="stat-label">最高</span>
                <span class="high-score-value" id="highScoreDisplay">0</span>
            </div>
        </div>
    </div>
    
    <!-- 游戏区域 -->
    <div class="game-area-container">
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
            <div style="text-align: center; padding: 10px; color: rgba(255, 255, 255, 0.7); font-size: 0.9em;">
                ⬆️ 在游戏区域上下左右滑动手势控制方向
            </div>
        </div>
    </div>
    
    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="control-title">方向键控制（备用）</div>
        <div class="direction-controls">
            <div class="direction-grid">
                <button class="direction-btn up" onclick="changeDirection('up')">
                    <span class="direction-icon">⬆️</span>
                    <span class="direction-label">向上</span>
                </button>
                <button class="direction-btn left" onclick="changeDirection('left')">
                    <span class="direction-icon">⬅️</span>
                    <span class="direction-label">向左</span>
                </button>
                <button class="direction-btn pause" onclick="pauseGame()">
                    <span class="direction-icon">⏸️</span>
                    <span class="direction-label">暂停</span>
                </button>
                <button class="direction-btn right" onclick="changeDirection('right')">
                    <span class="direction-icon">➡️</span>
                    <span class="direction-label">向右</span>
                </button>
                <button class="direction-btn down" onclick="changeDirection('down')">
                    <span class="direction-icon">⬇️</span>
                    <span class="direction-label">向下</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 陈翔递进版配置
        const config = {
            gridSize: 18,             // 网格大小
            baseSpeed: 200,           // 初始速度（较慢）
            speedMultiplier: 0.9,     // 每吃一个食物速度乘以此系数（减少10%间隔）
            currentSpeed: 200,        // 当前速度
            wallThickness: 6          // 墙壁厚度
        };
        
        // 游戏状态
        const game = {
            snake: [
                {x: 8, y: 10},        // 蛇头
                {x: 9, y: 10},        // 蛇身
                {x: 10, y: 10}        // 蛇尾
            ],
            food: {x: 5, y: 5},
            direction: 'right',
            nextDirection: 'right',
            isPlaying: true,
            isPaused: false,
            score: 3,                 // 初始分数对应蛇的3格
            highScore: 0,
            speedLevel: 0             // 速度级别
        };
        
        // DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        
        // 初始化画布
        function initCanvas() {
            const container = document.querySelector('.game-area-container');
            const containerRect = container.getBoundingClientRect();
            const maxHeight = containerRect.height * 0.75;
            const maxWidth = containerRect.width - 40;
            canvas.width = Math.min(maxWidth, maxHeight * 1.3);
            canvas.height = Math.min(maxHeight, maxWidth / 1.3);
            canvas.width = Math.max(canvas.width, 300);
            canvas.height = Math.max(canvas.height, 250);
            console.log('陈翔版画布大小:', canvas.width, '×', canvas.height);
        }
        
        // 绘制墙壁边界
        function drawWalls() {
            const wallGradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            wallGradient.addColorStop(0, '#667eea');
            wallGradient.addColorStop(0.5, '#764ba2');
            wallGradient.addColorStop(1, '#667eea');
            
            ctx.shadowColor = 'rgba(102, 126, 234, 0.6)';
            ctx.shadowBlur = 10;
            ctx.fillStyle = wallGradient;
            
            // 绘制四面墙
            ctx.beginPath();
            ctx.roundRect(0, 0, canvas.width, config.wallThickness, 12);
            ctx.roundRect(0, canvas.height - config.wallThickness, canvas.width, config.wallThickness, 12);
            ctx.roundRect(0, 0, config.wallThickness, canvas.height, 12);
            ctx.roundRect(canvas.width - config.wallThickness, 0, config.wallThickness, canvas.height, 12);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 绘制蛇
        function drawSnake() {
            game.snake.forEach((segment, index) => {
                const drawX = segment.x * config.gridSize + config.wallThickness;
                const drawY = segment.y * config.gridSize + config.wallThickness;
                
                if (index === 0) { // 蛇头
                    ctx.fillStyle = '#48bb78';
                    ctx.beginPath();
                    ctx.arc(drawX + config.gridSize / 2, drawY + config.gridSize / 2, config.gridSize / 2 - 1, 0, Math.PI * 2);
                    ctx.fill();
                } else if (index === game.snake.length - 1) { // 蛇尾
                    ctx.fillStyle = '#2f855a';
                    ctx.beginPath();
                    ctx.roundRect(drawX + 3, drawY + 3, config.gridSize - 6, config.gridSize - 6, 4);
                    ctx.fill();
                } else { // 蛇身
                    ctx.fillStyle = '#38a169';
                    ctx.fillRect(drawX + 1, drawY + 1, config.gridSize - 2, config.gridSize - 2);
                }
            });
        }
        
        // 绘制食物
        function drawFood() {
            ctx.fillStyle = '#ed8936';
            ctx.beginPath();
            ctx.roundRect(
                game.food.x * config.gridSize + config.wallThickness,
                game.food.y * config.gridSize + config.wallThickness,
                config.gridSize,
                config.gridSize,
                10
            );
            ctx.fill();
        }
        
        // 绘制游戏
        function draw() {
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawWalls();
            drawSnake();
            drawFood();
        }
        
        // 生成食物（避让蛇身）
        function generateFood() {
            const gridCountX = Math.floor(canvas.width / config.gridSize);
            const gridCountY = Math.floor(canvas.height / config.gridSize);
            let attempts = 0;
            
            do {
                game.food = {
                    x: Math.floor(Math.random() * gridCountX),
                    y: Math.floor(Math.random() * gridCountY)
                };
                attempts++;
            } while (isFoodOnSnake() && attempts < 50);
        }
        
        // 检查食物是否在蛇身上
        function isFoodOnSnake() {
            return game.snake.some(segment => segment.x === game.food.x && segment.y === game.food.y);
        }
        
        // 陈翔递进版核心：更新速度显示
        function updateSpeedDisplay() {
            const speedPercent = Math.round((config.baseSpeed / config.currentSpeed) * 100);
            speedDisplay.textContent = `x${(speedPercent / 100).toFixed(1)}`;
            speedDisplay.title = `速度：${Math.round(config.currentSpeed)}ms/格（初始${config.baseSpeed}ms）`;
        }
        
        // 更新游戏状态
        function update() {
            if (!game.isPlaying || game.isPaused) return;
            
            const head = {...game.snake[0]};
            switch (game.direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // 边界检查
            const gridCountX = Math.floor(canvas.width / config.gridSize);
            const gridCountY = Math.floor(canvas.height / config.gridSize);
            if (head.x < 0 || head.y < 0 || head.x >= gridCountX || head.y >= gridCountY) {
                gameOver();
                return;
            }
            
            // 碰撞检查
            for (const segment of game.snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver();
                    return;
                }
            }
            
            game.snake.unshift(head);
            
            // 吃食物逻辑（陈翔递进版核心）
            if (head.x === game.food.x && head.y === game.food.y) {
                game.score++;
                scoreDisplay.textContent = game.score;
                
                // 陈翔递进版：增加速度
                game.speedLevel++;
                config.currentSpeed = Math.max(80, config.baseSpeed * Math.pow(config.speedMultiplier, game.speedLevel));
                updateSpeedDisplay();
                
                if (game.score > game.highScore) {
                    game.highScore = game.score;
                    highScoreDisplay.textContent = game.highScore;
                    localStorage.setItem('snake_high_score', game.highScore);
                }
                
                generateFood();
            } else {
                game.snake.pop();
            }
            
            game.direction = game.nextDirection;
        }
        
        // 方向控制
        function changeDirection(newDirection) {
            const opposite = {up: 'down', down: 'up', left: 'right', right: 'left'};
            if (newDirection === opposite[game.direction]) {
                return;
            }
            game.nextDirection = newDirection;
            game.direction = newDirection;
        }
        
        // 暂停游戏
        function pauseGame() {
            game.isPaused = !game.isPaused;
            if (!game.isPaused) {
                gameLoop();
            }
        }
        
        // 游戏结束
        function gameOver() {
            game.isPlaying = false;
            alert(`游戏结束！\n长度: ${game.score}\n最高: ${game.highScore}\n最后速度: ${Math.round(config.currentSpeed)}ms/格\n\n点击确定重新开始`);
            resetGame();
        }
        
        // 重置游戏（陈翔递进版：重置速度）
        function resetGame() {
            const gridCountX = Math.floor(canvas.width / config.gridSize);
            const gridCountY = Math.floor(canvas.height / config.gridSize);
            const centerX = Math.floor(gridCountX / 2);
            const centerY = Math.floor(gridCountY / 2);
            
            game.snake = [
                {x: centerX, y: centerY},
                {x: centerX - 1, y: centerY},
                {x: centerX - 2, y: centerY}
            ];
            
            game.direction = 'right';
            game.nextDirection = 'right';
            game.isPlaying = true;
            game.isPaused = false;
            game.score = 3;
            scoreDisplay.textContent = game.score;
            
            // 陈翔递进版：重置速度
            game.speedLevel = 0;
            config.currentSpeed = config.baseSpeed;
            updateSpeedDisplay();
            
            generateFood();
            gameLoop();
        }
        
        // 触摸控制
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;
            const threshold = 25;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                if (deltaX > threshold) changeDirection('right');
                else if (deltaX < -threshold) changeDirection('left');
            } else {
                if (deltaY > threshold) changeDirection('down');
                else if (deltaY < -threshold) changeDirection('up');
            }
        }, { passive: false });
        
        // 游戏主循环
        let lastTime = 0;
        function gameLoop(timestamp = 0) {
            if (!game.isPlaying) return;
            const deltaTime = timestamp - lastTime;
            
            if (deltaTime > config.currentSpeed) {  // 使用当前速度
                update();
                draw();
                lastTime = timestamp;
            }
            
            if (!game.isPaused) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 页面加载
        window.addEventListener('load', () => {
            initCanvas();
            
            const savedScore = localStorage.getItem('snake_high_score');
            if (savedScore) {
                game.highScore = parseInt(savedScore);
                highScoreDisplay.textContent = game.highScore;
            }
            
            generateFood();
            gameLoop();
            
            window.addEventListener('resize', () => {
                initCanvas();
                draw();
            });
        });
        
        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }
    </script>
</body>
</html>
